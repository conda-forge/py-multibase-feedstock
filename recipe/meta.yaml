{% set name = "py-multibase" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 58c1a264195fa1ae29ea707c6fc8196446f4bdb92e0f9a0f131e0f280b238839

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pytest-runner
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - python-baseconv >=1.2.0,<2.0
    - six >=1.10.0,<2.0
    - morphys >=1.0,<2.0

test:
  imports:
    - multibase
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/multiformats/py-multibase
  summary: Multibase implementation for Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - step21
